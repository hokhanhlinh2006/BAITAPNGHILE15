<form th:action="@{/}" method="get">
    <input type="text" name="keyword" th:value="${keyword}" placeholder="Tìm theo tên">
    <button type="submit">Search</button>
</form>

<br>

<table border="1">
    <tr>
        <th>
            <a th:href="@{/(page=0, sortField='name', sortDir=${reverseSortDir}, keyword=${keyword})}">
                Tên
            </a>
        </th>
        <th>
            <a th:href="@{/(page=0, sortField='age', sortDir=${reverseSortDir}, keyword=${keyword})}">
                Tuổi
            </a>
        </th>
        <th>Phòng ban</th>
        <th>Ảnh</th>
    </tr>

    <tr th:if="${employees.size() == 0}">
        <td colspan="4">Không tìm thấy nhân viên nào</td>
    </tr>

    <tr th:each="e : ${employees}">
        <td th:text="${e.name}"></td>
        <td th:text="${e.age}"></td>
        <td th:text="${e.department.name}"></td>
        <td>
            <img th:if="${e.avatar != null}"
                 th:src="@{'/uploads/' + ${e.avatar}}"
                 width="80"/>
        </td>
    </tr>
</table>

<br>

<!-- PAGINATION -->
<div>
    <a th:if="${currentPage > 0}"
       th:href="@{/(page=${currentPage - 1}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}">
        Prev
    </a>

    <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
        <a th:href="@{/(page=${i}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}"
           th:style="${i == currentPage} ? 'font-weight:bold' : ''">
            [[${i + 1}]]
        </a>
    </span>

    <a th:if="${currentPage < totalPages - 1}"
       th:href="@{/(page=${currentPage + 1}, sortField=${sortField}, sortDir=${sortDir}, keyword=${keyword})}">
        Next
    </a>
</div>
