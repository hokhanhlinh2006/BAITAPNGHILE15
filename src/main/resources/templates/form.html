<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm nhân viên</title>
</head>
<body>

<h2>Thêm nhân viên</h2>

<form th:action="@{/save}" th:object="${employee}" method="post" enctype="multipart/form-data">

    Tên: <input type="text" th:field="*{name}"/><br>

    Tuổi: <input type="number" th:field="*{age}"/><br>

    Trạng thái: <input type="text" th:field="*{status}"/><br>

    Phòng ban:
    <select th:field="*{department.id}">
        <option th:each="d : ${departments}"
                th:value="${d.id}"
                th:text="${d.name}">
        </option>
    </select><br>

    Avatar:
    <input type="file" name="file"/><br>

    <button type="submit">Lưu</button>

</form>

</body>
</html>
